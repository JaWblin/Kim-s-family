<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
    <title>가족 일정 관리</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; }
    </style>
  </head>
  <body class="bg-slate-100 min-h-screen flex flex-col items-center p-4">
    <div class="w-full max-w-md bg-white rounded-3xl shadow-lg p-6 mt-2">
      
      <div class="text-center mb-6 border-b pb-4">
        <h1 id="today-date" class="text-2xl font-black text-slate-800">날짜 불러오는 중...</h1>
      </div>

      <div class="space-y-6">
        
        <div class="bg-amber-50/50 p-4 rounded-2xl border border-amber-100">
          <label class="block text-lg font-bold text-amber-700 mb-2">☀️ 주간 (낮)</label>
          <input type="text" id="dayManager" class="w-full p-3 border-2 border-slate-200 rounded-xl text-lg focus:outline-none focus:border-amber-500" placeholder="낮 담당자">
        </div>

        <div class="bg-indigo-50/50 p-4 rounded-2xl border border-indigo-100">
          <label class="block text-lg font-bold text-indigo-700 mb-2">🌙 야간 (밤)</label>
          <input type="text" id="nightManager" class="w-full p-3 border-2 border-slate-200 rounded-xl text-lg focus:outline-none focus:border-indigo-500" placeholder="밤 담당자">
        </div>

        <div class="p-2">
          <label class="block text-lg font-bold text-slate-700 mb-2">📢 전달사항</label>
          <textarea id="notes" rows="4" class="w-full p-3 border-2 border-slate-200 rounded-xl text-lg focus:outline-none focus:border-blue-500" placeholder="메모를 적어주세요."></textarea>
        </div>

        <button onclick="submitData()" id="save-btn" class="w-full bg-blue-600 active:bg-blue-700 text-white font-black py-4 rounded-2xl text-xl shadow-md transition duration-150 flex justify-center items-center">
          💾 완료! 일정 저장하기
        </button>
      </div>
    </div>

    <script>
      // 🚨 여기에 형의 Apps Script 웹앱 URL을 꼭 붙여넣어!!!
      const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxPVGCwzC7OnTkmaWeKOkmA4IwkHmiY1Sd4ppUkTCoU8vCk7YwOg88Yp8wT5gM7Z5bbFQ/exec";

      // 페이지 로드 시 데이터 불러오기
      window.onload = function() {
        const today = new Date();
        document.getElementById('today-date').innerText = `${today.getFullYear()}년 ${today.getMonth() + 1}월 ${today.getDate()}일`;

        fetch(APPS_SCRIPT_URL)
          .then(response => response.json())
          .then(data => {
            if(data.notes) document.getElementById('notes').value = data.notes;
            if(data.dayManager) document.getElementById('dayManager').value = data.dayManager;
            if(data.nightManager) document.getElementById('nightManager').value = data.nightManager;
          })
          .catch(error => console.error('Error:', error));
      };

      // 저장 버튼 누를 때 데이터 전송
      function submitData() {
        const btn = document.getElementById('save-btn');
        const notes = document.getElementById('notes').value;
        const dayManager = document.getElementById('dayManager').value;
        const nightManager = document.getElementById('nightManager').value;

        // 로딩 상태 표시
        btn.disabled = true;
        btn.innerText = "⏳ 저장 중...";
        btn.className = "w-full bg-slate-400 text-white font-black py-4 rounded-2xl text-xl flex justify-center items-center";

        // POST 요청 시 CORS 에러를 막기 위해 URLSearchParams 사용
        const formData = new URLSearchParams();
        formData.append('notes', notes);
        formData.append('dayManager', dayManager);
        formData.append('nightManager', nightManager);

        fetch(APPS_SCRIPT_URL, {
          method: 'POST',
          body: formData
        })
        .then(response => response.json())
        .then(data => {
          alert('가족 달력에 저장 완료! 👍');
          btn.disabled = false;
          btn.innerText = "💾 완료! 일정 저장하기";
          btn.className = "w-full bg-blue-600 active:bg-blue-700 text-white font-black py-4 rounded-2xl text-xl shadow-md flex justify-center items-center";
        })
        .catch(error => {
          alert('저장 중 오류가 발생했습니다
