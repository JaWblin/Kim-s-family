<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <title>가족 일정 달력</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; }
    body.modal-open { overflow: hidden; }
  </style>
</head>
<body class="bg-slate-50 min-h-screen p-2 sm:p-4 flex justify-center">
  
  <div class="w-full max-w-md bg-white rounded-3xl shadow-md p-4 sm:p-5 mt-2">
    <div class="flex justify-between items-center mb-6">
      <button onclick="changeMonth(-1)" class="p-3 bg-slate-100 rounded-xl hover:bg-slate-200 text-2xl font-bold transition">◀</button>
      <h2 id="month-year" class="text-2xl sm:text-3xl font-black text-slate-800">로딩 중...</h2>
      <button onclick="changeMonth(1)" class="p-3 bg-slate-100 rounded-xl hover:bg-slate-200 text-2xl font-bold transition">▶</button>
    </div>

    <div class="grid grid-cols-7 gap-1 text-center font-bold text-slate-500 mb-3 text-lg">
      <div class="text-red-500">일</div><div>월</div><div>화</div><div>수</div><div>목</div><div>금</div><div class="text-blue-500">토</div>
    </div>

    <div id="calendar-grid" class="grid grid-cols-7 gap-1.5 text-center"></div>
  </div>

  <div id="modal" class="hidden fixed inset-0 bg-slate-900 bg-opacity-50 flex items-center justify-center p-4 z-50">
    <div class="bg-white rounded-3xl w-full max-w-sm p-6 relative shadow-2xl">
      <button onclick="closeModal()" class="absolute top-3 right-4 text-slate-400 hover:text-slate-700 text-4xl font-bold px-2">&times;</button>
      
      <div class="flex items-center justify-between border-b pb-3 mb-5 pr-8">
        <button onclick="navigateModal(-1)" class="text-slate-400 hover:text-slate-800 text-3xl font-bold p-2">◀</button>
        <h3 id="modal-date-title" class="text-2xl font-black text-slate-800 text-center flex-1 mx-1"></h3>
        <button onclick="navigateModal(1)" class="text-slate-400 hover:text-slate-800 text-3xl font-bold p-2">▶</button>
      </div>

      <div id="view-mode" class="space-y-4">
        <div class="bg-amber-50 p-4 rounded-xl border border-amber-100">
          <span class="text-base font-bold text-amber-800 block mb-1">☀️ 주간 담당</span>
          <p id="view-day" class="text-2xl text-slate-800 font-black whitespace-pre-wrap">-</p>
        </div>
        <div class="bg-indigo-50 p-4 rounded-xl border border-indigo-100">
          <span class="text-base font-bold text-indigo-800 block mb-1">🌙 야간 담당</span>
          <p id="view-night" class="text-2xl text-slate-800 font-black whitespace-pre-wrap">-</p>
        </div>
        <div class="bg-slate-50 p-4 rounded-xl border border-slate-200">
          <span class="text-base font-bold text-slate-700 block mb-1">📢 가족 전달사항</span>
          <p id="view-notes" class="text-xl text-slate-800 font-bold whitespace-pre-wrap">-</p>
        </div>
        <button onclick="enterEditMode()" class="w-full mt-4 bg-slate-800 active:bg-slate-900 text-white font-black py-4 rounded-xl text-xl shadow">
          ✏️ 내용 수정하기
        </button>
      </div>

      <div id="edit-mode" class="hidden space-y-4">
        <div>
          <label class="block text-base font-bold text-amber-800 mb-1">☀️ 주간 담당</label>
          <input type="text" id="edit-day" class="w-full p-3 border-2 border-slate-200 rounded-xl text-xl font-bold focus:outline-none focus:border-amber-400">
        </div>
        <div>
          <label class="block text-base font-bold text-indigo-800 mb-1">🌙 야간 담당</label>
          <input type="text" id="edit-night" class="w-full p-3 border-2 border-slate-200 rounded-xl text-xl font-bold focus:outline-none focus:border-indigo-400">
        </div>
        <div>
          <label class="block text-base font-bold text-slate-700 mb-1">📢 전달사항</label>
          <textarea id="edit-notes" rows="3" class="w-full p-3 border-2 border-slate-200 rounded-xl text-xl font-bold focus:outline-none focus:border-blue-400"></textarea>
        </div>
        <div class="flex space-x-2 pt-2">
          <button onclick="cancelEdit()" class="w-1/3 bg-slate-200 active:bg-slate-300 text-slate-700 font-black py-4 rounded-xl text-lg">취소</button>
          <button onclick="saveData()" id="save-btn" class="w-2/3 bg-blue-600 active:bg-blue-700 text-white font-black py-4 rounded-xl text-lg shadow">💾 저장하기</button>
        </div>
      </div>

    </div>
  </div>

  <script>
    // 🚨 여기에 본인의 구글 Apps Script 웹앱 URL 주소를 정확히 입력하세요.
    const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxa34Xo-jEk-hIjdf-JU_vTNeXocnIMpDZmgCJQZxYQSKmXsMjCHgMUD9vPtrsIacZFQQ/exec";

    let currentDate = new Date();
    let scheduleData = {};
    let selectedDateStr = "";
    const weekDays = ['일', '월', '화', '수', '목', '금', '토'];

    window.onload = function() {
      fetchDataAndRender();
    };

    // GET 방식으로 데이터를 안전하게 읽어옴
    function fetchDataAndRender() {
      document.getElementById('month-year').innerText = "불러오는 중...";
      fetch(`${APPS_SCRIPT_URL}?action=read`)
        .then(response => response.json())
        .then(data => {
          scheduleData = data;
          renderCalendar();
        })
        .catch(error => {
          console.error("로드 실패:", error);
          document.getElementById('month-year').innerText = "오류 발생";
        });
    }

    function renderCalendar() {
      const year = currentDate.getFullYear();
      const month = currentDate.getMonth();
      document.getElementById('month-year').innerText = `${year}년 ${month + 1}월`;

      const firstDay = new Date(year, month, 1).getDay();
      const lastDate = new Date(year, month + 1, 0).getDate();
      const grid = document.getElementById('calendar-grid');
      grid.innerHTML = "";

      for (let i = 0; i < firstDay; i++) {
        grid.innerHTML += `<div class="p-1"></div>`;
      }

      for (let i = 1; i <= lastDate; i++) {
        const mStr = String(month + 1).padStart(2, '0');
        const dStr = String(i).padStart(2, '0');
        const dateStr = `${year}-${mStr}-${dStr}`;
        
        const today = new Date();
        const isToday = (i === today.getDate() && month === today.getMonth() && year === today.getFullYear());
        
        const dayData = scheduleData[dateStr] || { notes: "", dayManager: "", nightManager: "" };

        let cellClasses = "p-1 rounded-2xl text-center cursor-pointer transition flex flex-col items-center justify-between h-20 sm:h-24 border";
        if (isToday) {
          cellClasses += " bg-blue-50 text-blue-700 border-blue-400 ring-2 ring-blue-300 ring-opacity-50";
        } else {
          cellClasses += " bg-slate-50 hover:bg-slate-100 text-slate-800 border-slate-100";
        }

        let scheduleHtml = `<div class="w-full space-y-0.5 overflow-hidden flex-1 flex flex-col justify-end">`;
        if (dayData.dayManager) {
          scheduleHtml += `<div class="text-[11px] sm:text-xs font-bold text-amber-700 truncate bg-amber-50 rounded px-0.5 text-center">☀️${dayData.dayManager}</div>`;
        }
        if (dayData.nightManager) {
          scheduleHtml += `<div class="text-[11px] sm:text-xs font-bold text-indigo-700 truncate bg-indigo-50 rounded px-0.5 text-center">🌙${dayData.nightManager}</div>`;
        }
        if (!dayData.dayManager && !dayData.nightManager && dayData.notes) {
          scheduleHtml += `<div class="text-[11px] sm:text-xs font-bold text-slate-500 truncate bg-slate-100 rounded px-0.5 text-center">📢메모있음</div>`;
        }
        scheduleHtml += `</div>`;

        grid.innerHTML += `
          <div class="${cellClasses}" onclick="openModal('${dateStr}')">
            <span class="text-lg sm:text-xl font-extrabold block mt-0.5">${i}</span>
            ${scheduleHtml}
          </div>
        `;
      }
    }

    function changeMonth(step) {
      currentDate.setMonth(currentDate.getMonth() + step);
      renderCalendar();
    }

    function openModal(dateStr) {
      selectedDateStr = dateStr;
      const parts = dateStr.split('-');
      const y = parseInt(parts[0]);
      const m = parseInt(parts[1]);
      const d = parseInt(parts[2]);
      
      const dateObj = new Date(y, m - 1, d);
      const dayOfWeek = weekDays[dateObj.getDay()];
      
      document.getElementById('modal-date-title').innerText = `${y}년 ${m}월 ${d}일 (${dayOfWeek})`;
      
      const data = scheduleData[dateStr] || { notes: "", dayManager: "", nightManager: "" };
      
      document.getElementById('view-day').innerText = data.dayManager || "없음";
      document.getElementById('view-night').innerText = data.nightManager || "없음";
      document.getElementById('view-notes').innerText = data.notes || "없음";

      document.getElementById('edit-day').value = data.dayManager || "";
      document.getElementById('edit-night').value = data.nightManager || "";
      document.getElementById('edit-notes').value = data.notes || "";

      document.getElementById('view-mode').classList.remove('hidden');
      document.getElementById('edit-mode').classList.add('hidden');
      document.getElementById('modal').classList.remove('hidden');
      document.body.classList.add('modal-open');
    }

    function closeModal() {
      document.getElementById('modal').classList.add('hidden');
      document.body.classList.remove('modal-open');
    }

    function navigateModal(offset) {
      const parts = selectedDateStr.split('-');
      const y = parseInt(parts[0]);
      const m = parseInt(parts[1]);
      const d = parseInt(parts[2]);
      
      const dateObj = new Date(y, m - 1, d);
      dateObj.setDate(dateObj.getDate() + offset);
      
      const newY = dateObj.getFullYear();
      const newM = String(dateObj.getMonth() + 1).padStart(2, '0');
      const newD = String(dateObj.getDate()).padStart(2, '0');
      
      if (dateObj.getMonth() !== currentDate.getMonth() || dateObj.getFullYear() !== currentDate.getFullYear()) {
        currentDate = new Date(dateObj);
        renderCalendar();
      }
      
      openModal(`${newY}-${newM}-${newD}`);
    }

    function enterEditMode() {
      document.getElementById('view-mode').classList.add('hidden');
      document.getElementById('edit-mode').classList.remove('hidden');
    }

    function cancelEdit() {
      document.getElementById('view-mode').classList.remove('hidden');
      document.getElementById('edit-mode').classList.add('hidden');
    }

    // GET 방식으로 데이터를 전송하여 구글 보안 및 CORS 차단을 방지
    function saveData() {
      const btn = document.getElementById('save-btn');
      const day = document.getElementById('edit-day').value;
      const night = document.getElementById('edit-night').value;
      const notes = document.getElementById('edit-notes').value;

      btn.disabled = true;
      btn.innerText = "⏳ 저장 중...";

      const queryParams = new URLSearchParams({
        action: 'save',
        date: selectedDateStr,
        dayManager: day,
        nightManager: night,
        notes: notes
      }).toString();

      fetch(`${APPS_SCRIPT_URL}?${queryParams}`)
      .then(response => response.json())
      .then(result => {
        scheduleData[selectedDateStr] = { dayManager: day, nightManager: night, notes: notes };
        renderCalendar(); 
        btn.disabled = false;
        btn.innerText = "💾 저장하기";
        openModal(selectedDateStr); // 업데이트된 내용으로 새로고침
      })
      .catch(error => {
        console.error("저장 실패:", error);
        alert("저장 중 오류가 발생했습니다. 잠시 후 다시 시도해 주세요.");
        btn.disabled = false;
        btn.innerText = "💾 저장하기";
      });
    }
  </script>
</body>
</html>
