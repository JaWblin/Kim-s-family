<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <title>가족 일정 달력</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; }
    /* 모달 뜰 때 배경 스크롤 방지 */
    body.modal-open { overflow: hidden; }
  </style>
</head>
<body class="bg-slate-50 min-h-screen p-4 flex justify-center">
  
  <div class="w-full max-w-md bg-white rounded-3xl shadow p-5 mt-2">
    <div class="flex justify-between items-center mb-6">
      <button onclick="changeMonth(-1)" class="p-2 bg-slate-100 rounded-xl hover:bg-slate-200 transition">◀</button>
      <h2 id="month-year" class="text-2xl font-black text-slate-800">로딩 중...</h2>
      <button onclick="changeMonth(1)" class="p-2 bg-slate-100 rounded-xl hover:bg-slate-200 transition">▶</button>
    </div>

    <div class="grid grid-cols-7 gap-1 text-center font-bold text-slate-400 mb-2 text-sm">
      <div class="text-red-400">일</div><div>월</div><div>화</div><div>수</div><div>목</div><div>금</div><div class="text-blue-400">토</div>
    </div>

    <div id="calendar-grid" class="grid grid-cols-7 gap-2 text-center"></div>
  </div>

  <div id="modal" class="hidden fixed inset-0 bg-slate-900 bg-opacity-40 flex items-center justify-center p-4 z-50 transition-opacity">
    <div class="bg-white rounded-3xl w-full max-w-sm p-6 relative shadow-2xl">
      
      <button onclick="closeModal()" class="absolute top-4 right-4 text-slate-400 hover:text-slate-700 text-2xl font-bold px-2">&times;</button>
      
      <h3 id="modal-date-title" class="text-xl font-black text-slate-800 mb-5 border-b pb-3"></h3>

      <div id="view-mode" class="space-y-4">
        <div class="bg-amber-50 p-3 rounded-xl border border-amber-100">
          <span class="text-sm font-bold text-amber-700 block mb-1">☀️ 주간 담당</span>
          <p id="view-day" class="text-lg text-slate-700 font-medium whitespace-pre-wrap">없음</p>
        </div>
        <div class="bg-indigo-50 p-3 rounded-xl border border-indigo-100">
          <span class="text-sm font-bold text-indigo-700 block mb-1">🌙 야간 담당</span>
          <p id="view-night" class="text-lg text-slate-700 font-medium whitespace-pre-wrap">없음</p>
        </div>
        <div class="bg-slate-50 p-3 rounded-xl border border-slate-200">
          <span class="text-sm font-bold text-slate-600 block mb-1">📢 전달사항</span>
          <p id="view-notes" class="text-lg text-slate-700 font-medium whitespace-pre-wrap">없음</p>
        </div>
        <button onclick="enterEditMode()" class="w-full mt-4 bg-slate-800 text-white font-bold py-3 rounded-xl text-lg shadow">
          ✏️ 일정 편집하기
        </button>
      </div>

      <div id="edit-mode" class="hidden space-y-4">
        <div>
          <label class="block text-sm font-bold text-amber-700 mb-1">☀️ 주간 담당</label>
          <input type="text" id="edit-day" class="w-full p-2 border-2 border-slate-200 rounded-lg text-lg focus:outline-none focus:border-amber-400">
        </div>
        <div>
          <label class="block text-sm font-bold text-indigo-700 mb-1">🌙 야간 담당</label>
          <input type="text" id="edit-night" class="w-full p-2 border-2 border-slate-200 rounded-lg text-lg focus:outline-none focus:border-indigo-400">
        </div>
        <div>
          <label class="block text-sm font-bold text-slate-600 mb-1">📢 전달사항</label>
          <textarea id="edit-notes" rows="3" class="w-full p-2 border-2 border-slate-200 rounded-lg text-lg focus:outline-none focus:border-blue-400"></textarea>
        </div>
        <div class="flex space-x-2 pt-2">
          <button onclick="cancelEdit()" class="w-1/3 bg-slate-200 text-slate-700 font-bold py-3 rounded-xl">취소</button>
          <button onclick="saveData()" id="save-btn" class="w-2/3 bg-blue-600 text-white font-bold py-3 rounded-xl shadow">💾 저장</button>
        </div>
      </div>

    </div>
  </div>

  <script>
    // 🚨 여기에 구글 Apps Script 웹앱 URL을 붙여넣으세요!
    const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxa34Xo-jEk-hIjdf-JU_vTNeXocnIMpDZmgCJQZxYQSKmXsMjCHgMUD9vPtrsIacZFQQ/exec";

    let currentDate = new Date();
    let scheduleData = {}; // 서버에서 가져온 전체 데이터 저장
    let selectedDateStr = ""; // 현재 클릭한 날짜

    // 페이지 로드 시 데이터 가져오기
    window.onload = function() {
      fetchDataAndRender();
    };

    function fetchDataAndRender() {
      document.getElementById('month-year').innerText = "데이터 불러오는 중...";
      fetch(APPS_SCRIPT_URL)
        .then(response => response.json())
        .then(data => {
          scheduleData = data;
          renderCalendar();
        })
        .catch(error => {
          console.error("데이터 로드 실패:", error);
          document.getElementById('month-year').innerText = "불러오기 실패";
        });
    }

    // 달력 그리기 로직
    function renderCalendar() {
      const year = currentDate.getFullYear();
      const month = currentDate.getMonth();
      document.getElementById('month-year').innerText = `${year}년 ${month + 1}월`;

      const firstDay = new Date(year, month, 1).getDay();
      const lastDate = new Date(year, month + 1, 0).getDate();
      const grid = document.getElementById('calendar-grid');
      grid.innerHTML = "";

      // 1일 이전의 빈 칸 채우기
      for (let i = 0; i < firstDay; i++) {
        grid.innerHTML += `<div class="p-2"></div>`;
      }

      // 날짜 채우기
      for (let i = 1; i <= lastDate; i++) {
        // YYYY-MM-DD 포맷 만들기
        const mStr = String(month + 1).padStart(2, '0');
        const dStr = String(i).padStart(2, '0');
        const dateStr = `${year}-${mStr}-${dStr}`;
        
        // 오늘 날짜인지 확인
        const today = new Date();
        const isToday = (i === today.getDate() && month === today.getMonth() && year === today.getFullYear());
        
        // 해당 날짜에 데이터가 있는지 확인
        const hasData = scheduleData[dateStr] && (scheduleData[dateStr].notes || scheduleData[dateStr].dayManager || scheduleData[dateStr].nightManager);

        let cellClasses = "p-3 rounded-xl text-lg font-medium cursor-pointer transition flex flex-col items-center justify-center h-14";
        
        if (isToday) {
          cellClasses += " bg-blue-100 text-blue-700 ring-2 ring-blue-400";
        } else {
          cellClasses += " bg-white hover:bg-slate-100 text-slate-700";
        }

        // 일정이 있으면 파란색 점 표시
        const dotHtml = hasData ? `<div class="w-1.5 h-1.5 bg-blue-500 rounded-full mt-1"></div>` : `<div class="w-1.5 h-1.5 mt-1"></div>`;

        grid.innerHTML += `
          <div class="${cellClasses}" onclick="openModal('${dateStr}')">
            <span>${i}</span>
            ${dotHtml}
          </div>
        `;
      }
    }

    function changeMonth(step) {
      currentDate.setMonth(currentDate.getMonth() + step);
      renderCalendar();
    }

    // --- 팝업(모달) 관련 로직 --- //

    function openModal(dateStr) {
      selectedDateStr = dateStr;
      const parts = dateStr.split('-');
      document.getElementById('modal-date-title').innerText = `${parts[0]}년 ${parseInt(parts[1])}월 ${parseInt(parts[2])}일`;
      
      const data = scheduleData[dateStr] || { notes: "", dayManager: "", nightManager: "" };
      
      // 보기 모드에 데이터 세팅
      document.getElementById('view-day').innerText = data.dayManager || "-";
      document.getElementById('view-night').innerText = data.nightManager || "-";
      document.getElementById('view-notes').innerText = data.notes || "-";

      // 편집 모드 인풋창에 데이터 미리 세팅
      document.getElementById('edit-day').value = data.dayManager || "";
      document.getElementById('edit-night').value = data.nightManager || "";
      document.getElementById('edit-notes').value = data.notes || "";

      // 보기 모드로 창 열기
      document.getElementById('view-mode').classList.remove('hidden');
      document.getElementById('edit-mode').classList.add('hidden');
      
      document.getElementById('modal').classList.remove('hidden');
      document.body.classList.add('modal-open');
    }

    function closeModal() {
      document.getElementById('modal').classList.add('hidden');
      document.body.classList.remove('modal-open');
    }

    function enterEditMode() {
      document.getElementById('view-mode').classList.add('hidden');
      document.getElementById('edit-mode').classList.remove('hidden');
    }

    function cancelEdit() {
      document.getElementById('view-mode').classList.remove('hidden');
      document.getElementById('edit-mode').classList.add('hidden');
    }

    // 데이터 저장
    function saveData() {
      const btn = document.getElementById('save-btn');
      const day = document.getElementById('edit-day').value;
      const night = document.getElementById('edit-night').value;
      const notes = document.getElementById('edit-notes').value;

      btn.disabled = true;
      btn.innerText = "⏳ 저장 중...";

      const formData = new URLSearchParams();
      formData.append('date', selectedDateStr);
      formData.append('dayManager', day);
      formData.append('nightManager', night);
      formData.append('notes', notes);

      fetch(APPS_SCRIPT_URL, {
        method: 'POST',
        body: formData
      })
      .then(response => response.json())
      .then(result => {
        // 로컬 데이터 즉시 업데이트
        scheduleData[selectedDateStr] = { dayManager: day, nightManager: night, notes: notes };
        
        // 달력 다시 그려서 점(dot) 반영
        renderCalendar(); 
        
        // 버튼 복구 및 보기 모드로 전환
        btn.disabled = false;
        btn.innerText = "💾 저장";
        openModal(selectedDateStr); // 업데이트된 내용으로 다시 보기
      })
      .catch(error => {
        alert("오류가 발생했습니다.");
        btn.disabled = false;
        btn.innerText = "💾 저장";
      });
    }
  </script>
</body>
</html>
